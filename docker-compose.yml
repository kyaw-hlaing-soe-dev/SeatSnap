version: '3.8'

services:
  redis:
    image: redis:7.2
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_PATH=/app/seatsnap.db
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost:3001
    volumes:
      - ./backend/seatsnap.db:/app/seatsnap.db
    networks:
      - app_network

  frontend:
    build: ./frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    networks:
      - app_network

volumes:
  redis_data:

networks:
  app_network: